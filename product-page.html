<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHITECT HOODIE | MUDÈRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root { --bg-dark: #080808; --text-light: #ffffff; --accent-gold: #D4AF37; }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: 'Montserrat', sans-serif; }
        .product-layout { display: grid; grid-template-columns: 1.2fr 1fr; max-width: 1400px; margin: 100px auto 0; padding: 0 4%; }
        .swatch { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 1px solid #333; margin-right: 10px; display: inline-block; }
        .swatch.active { border: 1px solid var(--accent-gold); transform: scale(1.1); }
        .add-btn { width: 100%; background: var(--accent-gold); color: black; border: none; padding: 20px; font-family: 'Cinzel', serif; cursor: pointer; margin-top: 20px; }
        .qty-box { display: flex; align-items: center; gap: 15px; margin: 20px 0; }
    </style>
</head>
<body>

    <header>
        <div class="nav-container" style="display:flex; justify-content:space-between; padding:20px 4%;">
            <a href="index.html">RETURN</a>
            <a id="cart-trigger" style="cursor:pointer;">CART (<span id="cart-count">0</span>)</a>
        </div>
    </header>

    <main class="product-layout">
        <div class="product-gallery">
            <img id="main-front-img" src="img/hoodie-front-teal.png" style="width:100%;">
        </div>

        <div class="product-info">
            <h1>THE ARCHITECT HOODIE</h1>
            <p class="price">₹4,800</p>
            
            <div class="color-options">
                <div class="swatch active" style="background-color: #C1C9BA;" data-color="TEAL" data-front="img/hoodie-front-teal.png"></div>
                <div class="swatch" style="background-color: #F5F5DC;" data-color="CREAM" data-front="img/hoodie-front-cream.png"></div>
            </div>

            <div class="qty-box">
                <span>QUANTITY</span>
                <button onclick="changeQty(-1)">-</button>
                <span id="qty-val">1</span>
                <button onclick="changeQty(1)">+</button>
            </div>

            <button id="add-to-atelier" class="add-btn" 
                onclick="addToCart('ARCHITECT HOODIE', 4800, document.getElementById('main-front-img').src, currentQty)">
                ADD TO ATELIER
            </button>
        </div>
    </main>

    <button id="topBtn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" 
        style="position:fixed; bottom:30px; right:30px; background:transparent; border:1px solid #D4AF37; color:#D4AF37; padding:15px; cursor:pointer; display:none;">↑</button>

    <script src="scripts.js"></script>
    <script>
        // Swatch logic
        document.querySelectorAll('.swatch').forEach(swatch => {
            swatch.addEventListener('click', function() {
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('main-front-img').src = this.getAttribute('data-front');
            });
        });
    </script>
</body>
</html>
